<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIFA WORLD CUP GAME</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home">


<button id="startBtn" onclick="startGame('Guest')"></button>

<button id="playerBtn" onclick="showPlayers()"></button>

<button id="settingsBtn" onclick="showSettings()"></button>
</div>
<div id="settings" style="display:none;">

<h2>Settings</h2>

<button onclick="toggleSound()">
Sound ON/OFF
</button>

<button onclick="goHome()"></button>
Back
</button>

</div>
<div id="players" style="display:none;">

<button id="ronaldoBtn" onclick="startGame('Ronaldo')"></button>

<button id="messiBtn" onclick="startGame('Messi')"></button>

<button id="neymarBtn" onclick="startGame('Neymar')"></button>

<button onclick="goHome()">⬅ Back</button>

</div>

<div id="game" style="display:none;">
  <h2 id="playerName"></h2>

  <h3>Goals: <span id="score">0</span></h3>
  <h3>Shots Left: <span id="shots">5</span></h3>

  <div class="goal">
    <img id="keeper" src="IMG_4324.png">
  </div>

  <div class="ball-area">
    <button onclick="shoot('left')">LEFT</button>
    <button onclick="shoot('center')">CENTER</button>
    <button onclick="shoot('right')">RIGHT</button>
  </div>

  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
